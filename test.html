<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>다이아몬드 격자 패턴 테스트</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        canvas { background-color: white; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { font-family: sans-serif; color: #333; }
    </style>
</head>
<body>

    <h2>Canvas 다이아몬드 패턴 원 그리기</h2>
    <canvas id="myCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        /**
         * 다이아몬드(Staggered) 패턴으로 원을 그리는 함수
         */
        function drawCircles(startX, startY, holeSize, horizontalSpacing, height, verticalSpacing, holeCount) {
            const radius = (holeSize / 2);
            // 전체 높이 범위 내에서 몇 줄을 그릴지 계산
            const verticalCount = Math.floor((height - holeSize) / verticalSpacing);
            
            console.log("반지름: " + radius);
            console.log("줄 개수: " + verticalCount);

            ctx.strokeStyle = '#2c3e50'; // 원 테두리 색상
            ctx.lineWidth = 1;

            for (let j = 0; j < verticalCount; j++) {
                // y좌표: 아래에서 위로 쌓기 (startY 기준 위쪽으로)
                let circle_y = startY - (j * verticalSpacing);
                
                // ★ 핵심: 홀수 줄(j % 2 !== 0)일 때 가로 간격의 절반만큼 밀기
                let offsetX = (j % 2) * (horizontalSpacing / 2); 
                
                for (let i = 0; i < holeCount; i++) {
                    let circle_x = startX + (i * horizontalSpacing) + offsetX;
                    
                    ctx.beginPath();
                    // 원 그리기 (x, y, 반지름, 시작각도, 끝각도)
                    ctx.arc(circle_x, circle_y, radius, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            }
        }

        // 함수 실행 예시
        // 시작X: 50, 시작Y: 450(하단), 원크기: 20, 가로간격: 40, 전체높이: 400, 세로간격: 35, 가로개수: 13
        drawCircles(50, 450, 20, 80, 400, 40, 2);

    </script>
</body>
</html>
